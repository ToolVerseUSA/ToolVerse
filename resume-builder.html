<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Resume Builder | ToolVerse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="container">

<div class="logo">
🚀 ToolVerse
</div>

<nav>

<a href="index.html">Home</a>
<a href="index.html#tools">AI Tools</a>
<a href="index.html#contact">Contact</a>

</nav>

</div>

</header>

<section class="hero">

<h1>AI Resume Builder</h1>

<p>
Create a professional resume in minutes.
</p>

</section>

<section class="resume-builder">

<div class="container">

<div class="resume-grid">

<div class="resume-form">

<h2>Your Information</h2>

<label>Full Name</label>
<input type="text" id="name" placeholder="John Smith">

<label>Email</label>
<input type="email" id="email" placeholder="john@email.com">

<label>Phone</label>
<input type="text" id="phone" placeholder="+92 300 1234567">

<label>Address</label>
<input type="text" id="address" placeholder="Hyderabad, Pakistan">

<label>Skills</label>
<textarea id="skills" rows="4" placeholder="HTML, CSS, JavaScript"></textarea>

<label>Education</label>
<textarea id="education" rows="4" placeholder="BS Computer Science"></textarea>

<label>Experience</label>
<textarea id="experience" rows="6" placeholder="Web Developer at ABC Company"></textarea>

<button class="btn" id="generateBtn">
Generate Resume
</button>

<button class="btn" id="printBtn">
Print Resume
</button>

</div>

<div class="resume-preview">

<h2>Resume Preview</h2>

<div id="preview">

<h1>Your Name</h1>

<p>Email</p>

<p>Phone</p>

<p>Address</p>

<hr>

<h3>Skills</h3>

<p>Your skills will appear here.</p>

<h3>Education</h3>

<p>Your education will appear here.</p>

<h3>Experience</h3>

<p>Your experience will appear here.</p>

</div>

</div>

</div>

</div>

</section>

<script src="resume-builder.js"></script>

</body>

</html>
