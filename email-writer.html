<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Email Writer | ToolVerse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="container">

<div class="logo">
🚀 ToolVerse
</div>

<nav>

<a href="index.html">Home</a>
<a href="index.html#tools">AI Tools</a>
<a href="index.html#contact">Contact</a>

</nav>

</div>

</header>

<section class="hero">

<h1>AI Email Writer</h1>

<p>
Generate professional emails in seconds.
</p>

</section>

<section class="resume-builder">

<div class="container">

<div class="resume-grid">

<div class="resume-form">

<h2>Email Details</h2>

<label>Recipient</label>
<input type="text" id="recipient" placeholder="Manager">

<label>Subject</label>
<input type="text" id="subject" placeholder="Leave Request">

<label>Tone</label>

<select id="tone">

<option>Professional</option>

<option>Friendly</option>

<option>Formal</option>

<option>Casual</option>

</select>

<label>Purpose</label>

<textarea
id="purpose"
rows="6"
placeholder="Explain what this email should say..."></textarea>

<button class="btn" id="generateEmail">
Generate Email
</button>

</div>

<div class="resume-preview">

<h2>Email Preview</h2>

<div id="emailPreview">

<p>
Your generated email will appear here.
</p>

</div>

</div>

</div>

</div>

</section>

<script src="email-writer.js"></script>

</body>

</html>
