<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Extractor & Translator | ToolVerse</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .tool-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .tool-header { text-align: center; margin-bottom: 30px; }
        .tool-header h1 { font-size: 2.2rem; color: #fbbf24; margin-bottom: 10px; }
        .tool-header p { color: #94a3b8; font-size: 0.95rem; }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tool-input {
            flex: 1;
            min-width: 280px;
            padding: 15px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        .tool-input:focus, .tool-select:focus { outline: none; border-color: #fbbf24; }
        
        .tool-select {
            padding: 15px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1e293b;
            font-weight: 700;
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            width: 100%;
            padding-top: 15px;
            padding-bottom: 15px;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }

        .result-section {
            display: none;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 20px;
        }
        .transcript-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            max-height: 500px;
            overflow-y: auto;
            color: #cbd5e1;
            font-size: 1.05rem;
            line-height: 1.8;
            white-space: pre-wrap;
            margin-bottom: 20px;
            direction: auto; /* Supports RTL languages like Urdu/Arabic */
        }
        .btn-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .sec-btn {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .sec-btn:hover { background: #2563eb; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #94a3b8; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #fbbf24; }
        .loading { text-align: center; color: #fbbf24; font-weight: 600; display: none; margin: 20px 0; }
    </style>
</head>
<body style="background: #090d16; font-family: 'Inter', sans-serif; padding: 20px;">

    <div style="max-width: 900px; margin: 0 auto;">
        <a href="index.html" class="back-link">← Back to ToolVerse</a>
    </div>

    <div class="tool-container">
        <div class="tool-header">
            <h1>📜 AI Transcript Extractor & Translator</h1>
            <p>Extract and automatically translate YouTube transcripts into your local language.</p>
        </div>

        <div class="input-group">
            <input type="text" id="ytUrlInput" class="tool-input" placeholder="Paste YouTube Video URL here...">
            <select id="langSelect" class="tool-select">
                <option value="ur">Urdu (اردو)</option>
                <option value="en">English (English)</option>
                <option value="hi">Hindi (हिन्दी)</option>
                <option value="ar">Arabic (العربية)</option>
                <option value="fa">Persian (فارسی)</option>
                <option value="ps">Pashto (پښتو)</option>
                <option value="sd">Sindhi (سنڌي)</option>
                <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
                <option value="bn">Bengali (বাংলা)</option>
                <option value="tr">Turkish (Türkçe)</option>
                <option value="es">Spanish (Español)</option>
                <option value="fr">French (Français)</option>
                <option value="de">German (Deutsch)</option>
                <option value="zh">Chinese (中文)</option>
                <option value="ja">Japanese (日本語)</option>
                <option value="ko">Korean (한국어)</option>
                <option value="ru">Russian (Русский)</option>
            </select>
        </div>
        <button id="extractBtn" class="action-btn">Extract & Translate Transcript</button>

        <div class="loading" id="loadingText">Extracting and translating... This might take a few seconds...</div>

        <div class="result-section" id="resultSection">
            <h3 style="margin-bottom: 15px; color: #fbbf24;">Generated Transcript:</h3>
            <div class="transcript-box" id="transcriptOutput"></div>
            <div class="btn-row">
                <button class="sec-btn" id="copyBtn">📋 Copy to Clipboard</button>
                <button class="sec-btn" id="downloadTxtBtn" style="background: #10b981;">📥 Download as TXT</button>
            </div>
        </div>
    </div>

    <script>
        // Function to chunk large text so free translation APIs don't fail
        function chunkText(text, length) {
            const chunks = [];
            for (let i = 0; i < text.length; i += length) {
                chunks.push(text.substring(i, i + length));
            }
            return chunks;
        }

        // Function to translate text using a free Google Translate proxy
        async function translateText(text, targetLang) {
            if (targetLang === 'en' || !targetLang) return text; // No translation needed if target is English
            
            // Clean up text format slightly before translation
            text = text.replace(/\[\d+:\d+\]/g, ''); // Remove timestamps like [0:03] for cleaner translation

            const chunks = chunkText(text, 4000); // Google API limit per request is usually 5000
            let translatedFullText = "";

            for (const chunk of chunks) {
                try {
                    const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=${targetLang}&dt=t&q=${encodeURIComponent(chunk)}`;
                    const res = await fetch(url);
                    const data = await res.json();
                    
                    let translatedChunk = "";
                    data[0].forEach(item => {
                        if (item[0]) translatedChunk += item[0];
                    });
                    
                    translatedFullText += translatedChunk + " ";
                } catch (e) {
                    console.error("Translation Error: ", e);
                    return "Translation failed midway. Here is the original text:\n\n" + text;
                }
            }
            return translatedFullText;
        }

        document.getElementById('extractBtn').addEventListener('click', async function() {
            const url = document.getElementById('ytUrlInput').value.trim();
            const langSelectElem = document.getElementById('langSelect');
            const lang = langSelectElem.value;
            const langName = langSelectElem.options[langSelectElem.selectedIndex].text;
            const videoId = extractYouTubeVideoId(url);

            if (!videoId) {
                alert('Please enter a valid YouTube video URL!');
                return;
            }

            const loadingText = document.getElementById('loadingText');
            const resultSection = document.getElementById('resultSection');
            const transcriptOutput = document.getElementById('transcriptOutput');

            loadingText.style.display = 'block';
            resultSection.style.display = 'none';
            transcriptOutput.innerText = '';

            try {
                // Step 1: Extract the base English transcript first
                const apiUrl = `https://youtube-transcript.ai/transcript/${videoId}.txt`;
                const response = await fetch(apiUrl);
                
                if (!response.ok) {
                    throw new Error(`YouTube restricted captions for this video or they don't exist.`);
                }
                
                let rawText = await response.text();
                
                // Clean up the watermark from the external API
                rawText = rawText.replace(/---\nGenerated by https:\/\/youtube-transcript\.ai[\s\S]*/g, '');

                if (rawText && rawText.trim().length > 0) {
                    
                    // Step 2: Translate the extracted text to the user's selected language
                    if(lang !== 'en') {
                        loadingText.innerText = `Transcript found! Translating to ${langName}... Please wait.`;
                        rawText = await translateText(rawText, lang);
                    }

                    transcriptOutput.innerText = `[Language: ${langName}]\n\n` + rawText.trim();
                    loadingText.style.display = 'none';
                    loadingText.innerText = "Extracting and translating... This might take a few seconds...";
                    resultSection.style.display = 'block';
                } else {
                    throw new Error("Transcript file was empty.");
                }

            } catch (error) {
                loadingText.style.display = 'none';
                loadingText.innerText = "Extracting and translating... This might take a few seconds...";
                transcriptOutput.innerText = `Error: Could not extract transcript.\n\nNote: Make sure the video has public subtitles enabled. Private videos or videos without any captions will not work.`;
                resultSection.style.display = 'block';
            }
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const text = document.getElementById('transcriptOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Transcript copied to clipboard!');
            });
        });

        document.getElementById('downloadTxtBtn').addEventListener('click', function() {
            const text = document.getElementById('transcriptOutput').innerText;
            const blob = new Blob([text], { type: 'text/plain;charset=utf-8' });
            const anchor = document.createElement('a');
            anchor.href = URL.createObjectURL(blob);
            anchor.download = 'ToolVerse-Transcript.txt';
            anchor.click();
        });

        function extractYouTubeVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
