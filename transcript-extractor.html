<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YouTube Transcript Extractor | ToolVerse</title>
    <link rel="stylesheet" href="style.css?v=6">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        .tool-container {
            max-width: 900px;
            margin: 40px auto;
            background: rgba(15, 23, 42, 0.95);
            border: 1px solid rgba(251, 191, 36, 0.3);
            border-radius: 20px;
            padding: 30px;
            color: white;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        .tool-header { text-align: center; margin-bottom: 30px; }
        .tool-header h1 { font-size: 2.2rem; color: #fbbf24; margin-bottom: 10px; }
        .tool-header p { color: #94a3b8; font-size: 0.95rem; }
        
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .tool-input {
            flex: 1;
            min-width: 280px;
            padding: 15px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
        }
        .tool-input:focus, .tool-select:focus { outline: none; border-color: #fbbf24; }
        
        .tool-select {
            padding: 15px 20px;
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            font-family: inherit;
            cursor: pointer;
        }
        
        .action-btn {
            background: linear-gradient(135deg, #fbbf24 0%, #f59e0b 100%);
            color: #1e293b;
            font-weight: 700;
            padding: 0 25px;
            border-radius: 12px;
            border: none;
            cursor: pointer;
            transition: 0.3s;
            font-size: 1rem;
            width: 100%;
            padding-top: 15px;
            padding-bottom: 15px;
        }
        .action-btn:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(245, 158, 11, 0.4); }

        .result-section {
            display: none;
            background: #1e293b;
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255,255,255,0.05);
            margin-top: 20px;
        }
        .transcript-box {
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            padding: 20px;
            max-height: 400px;
            overflow-y: auto;
            color: #cbd5e1;
            font-size: 0.95rem;
            line-height: 1.6;
            white-space: pre-wrap;
            margin-bottom: 20px;
        }
        .btn-row {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }
        .sec-btn {
            background: #3b82f6;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        .sec-btn:hover { background: #2563eb; }
        .back-link { display: inline-block; margin-bottom: 20px; color: #94a3b8; text-decoration: none; font-weight: 500; }
        .back-link:hover { color: #fbbf24; }
        .loading { text-align: center; color: #fbbf24; font-weight: 600; display: none; margin: 20px 0; }
    </style>
</head>
<body style="background: #090d16; font-family: 'Inter', sans-serif; padding: 20px;">

    <div style="max-width: 900px; margin: 0 auto;">
        <a href="index.html" class="back-link">← Back to ToolVerse</a>
    </div>

    <div class="tool-container">
        <div class="tool-header">
            <h1>📜 YouTube Transcript Extractor</h1>
            <p>Extract subtitles and transcripts directly from YouTube's internal APIs.</p>
        </div>

        <div class="input-group">
            <input type="text" id="ytUrlInput" class="tool-input" placeholder="Paste YouTube Video URL here...">
            <select id="langSelect" class="tool-select">
                <option value="en-US">English (United States)</option>
                <option value="en-GB">English (United Kingdom)</option>
                <option value="en-AU">English (Australian)</option>
                <option value="en">English (General)</option>
                <option value="ur">Urdu (اردو)</option>
                <option value="hi">Hindi (हिन्दी)</option>
                <option value="ar">Arabic (العربية)</option>
                <option value="fa">Persian (فارسی)</option>
                <option value="ps">Pashto (پښتو)</option>
                <option value="sd">Sindhi (سنڌي)</option>
                <option value="pa">Punjabi (ਪੰਜਾਬੀ)</option>
                <option value="bn">Bengali (বাংলা)</option>
                <option value="tr">Turkish (Türkçe)</option>
                <option value="es">Spanish (Español)</option>
                <option value="fr">French (Français)</option>
                <option value="de">German (Deutsch)</option>
                <option value="zh">Chinese (中文)</option>
                <option value="ja">Japanese (日本語)</option>
                <option value="ko">Korean (한국어)</option>
                <option value="ru">Russian (Русский)</option>
                <option value="id">Indonesian (Bahasa Indonesia)</option>
                <option value="ms">Malay (Bahasa Melayu)</option>
                <option value="it">Italian (Italiano)</option>
                <option value="pt">Portuguese (Português)</option>
                <option value="vi">Vietnamese (Tiếng Việt)</option>
                <option value="th">Thai (ไทย)</option>
                <option value="nl">Dutch (Nederlands)</option>
                <option value="pl">Polish (Polski)</option>
                <option value="uk">Ukrainian (Українська)</option>
                <option value="el">Greek (Ελληνικά)</option>
                <option value="he">Hebrew (עברית)</option>
                <option value="sv">Swedish (Svenska)</option>
                <option value="fi">Finnish (Suomi)</option>
            </select>
        </div>
        <button id="extractBtn" class="action-btn">Extract Clean Transcript</button>

        <div class="loading" id="loadingText">Connecting to YouTube's server to fetch captions...</div>

        <div class="result-section" id="resultSection">
            <h3 style="margin-bottom: 15px; color: #fbbf24;">Extracted Transcript:</h3>
            <div class="transcript-box" id="transcriptOutput"></div>
            <div class="btn-row">
                <button class="sec-btn" id="copyBtn">📋 Copy to Clipboard</button>
                <button class="sec-btn" id="downloadTxtBtn" style="background: #10b981;">📥 Download as TXT</button>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('extractBtn').addEventListener('click', async function() {
            const url = document.getElementById('ytUrlInput').value.trim();
            const langSelectElem = document.getElementById('langSelect');
            const lang = langSelectElem.value;
            const langName = langSelectElem.options[langSelectElem.selectedIndex].text;
            const videoId = extractYouTubeVideoId(url);

            if (!videoId) {
                alert('Please enter a valid YouTube video URL!');
                return;
            }

            const loadingText = document.getElementById('loadingText');
            const resultSection = document.getElementById('resultSection');
            const transcriptOutput = document.getElementById('transcriptOutput');

            loadingText.style.display = 'block';
            resultSection.style.display = 'none';
            transcriptOutput.innerText = '';

            try {
                // Step 1: Fetch raw YouTube Video Page to find internal Caption Tracks
                const proxyUrl = `https://api.allorigins.win/get?url=${encodeURIComponent('https://www.youtube.com/watch?v=' + videoId)}`;
                const response = await fetch(proxyUrl);
                const data = await response.json();
                const html = data.contents;

                // Step 2: Look for the exact caption JSON data hidden in YouTube's code
                const regex = /"captions":\{"playerCaptionsTracklistRenderer":(\{.*?\})\}/;
                const match = html.match(regex);

                if (!match) {
                    throw new Error("No closed captions (CC) or Subtitles found for this video.");
                }

                // Step 3: Parse the exact language tracks available
                const tracklist = JSON.parse(`{"playerCaptionsTracklistRenderer":${match[1]}}`);
                const tracks = tracklist.playerCaptionsTracklistRenderer.captionTracks;

                if (!tracks || tracks.length === 0) {
                    throw new Error("Captions exist but cannot be loaded.");
                }

                // Find the user's selected language, or fall back to base language, or default to English
                let targetTrack = tracks.find(t => t.languageCode === lang) || 
                                  tracks.find(t => t.languageCode.startsWith(lang.split('-')[0])) || 
                                  tracks.find(t => t.languageCode === 'en') || 
                                  tracks[0];

                const actualLangName = targetTrack.name.simpleText || langName;

                // Step 4: Fetch the actual XML file of the transcript from YouTube's direct API
                const transcriptUrl = targetTrack.baseUrl;
                const tResponse = await fetch(`https://api.allorigins.win/get?url=${encodeURIComponent(transcriptUrl)}`);
                const tData = await tResponse.json();
                
                // Step 5: Convert XML text tags into clean readable text
                const parser = new DOMParser();
                const xmlDoc = parser.parseFromString(tData.contents, "text/xml");
                const textNodes = xmlDoc.getElementsByTagName("text");
                
                let transcriptText = "";
                for (let i = 0; i < textNodes.length; i++) {
                    transcriptText += textNodes[i].textContent + " ";
                }

                // Clean up formatting and extra spaces
                transcriptText = transcriptText.replace(/\s+/g, ' ').trim();
                
                // Unescape HTML elements like &#39; to '
                let textArea = document.createElement('textarea');
                textArea.innerHTML = transcriptText;
                let cleanTranscript = textArea.value;

                if (cleanTranscript.length > 0) {
                    transcriptOutput.innerText = `[Video ID: ${videoId} | Language: ${actualLangName}]\n\n` + cleanTranscript;
                    loadingText.style.display = 'none';
                    resultSection.style.display = 'block';
                } else {
                    throw new Error("Transcript file was completely empty.");
                }

            } catch (error) {
                loadingText.style.display = 'none';
                transcriptOutput.innerText = `Error: ${error.message}\n\nNote: Make sure the video has Subtitles/CC enabled. Auto-generated captions or disabled captions might not be extractable.`;
                resultSection.style.display = 'block';
            }
        });

        document.getElementById('copyBtn').addEventListener('click', function() {
            const text = document.getElementById('transcriptOutput').innerText;
            navigator.clipboard.writeText(text).then(() => {
                alert('Transcript copied to clipboard!');
            });
        });

        document.getElementById('downloadTxtBtn').addEventListener('click', function() {
            const text = document.getElementById('transcriptOutput').innerText;
            const blob = new Blob([text], { type: 'text/plain' });
            const anchor = document.createElement('a');
            anchor.href = URL.createObjectURL(blob);
            anchor.download = 'youtube-transcript.txt';
            anchor.click();
        });

        function extractYouTubeVideoId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }
    </script>
</body>
</html>
