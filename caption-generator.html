<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Caption Generator | ToolVerse</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<header>

<div class="container">

<div class="logo">
🚀 ToolVerse
</div>

<nav>

<a href="index.html">Home</a>
<a href="index.html#tools">AI Tools</a>
<a href="index.html#contact">Contact</a>

</nav>

</div>

</header>

<section class="hero">

<h1>AI Caption Generator</h1>

<p>
Generate engaging captions for your social media posts in seconds.
</p>

</section>

<section class="caption-generator">

<div class="container">

<div class="caption-grid">

<!-- Input -->

<div class="caption-form">

<h2>Create Caption</h2>

<label>Platform</label>

<select id="platform">

<option value="instagram">Instagram</option>

<option value="facebook">Facebook</option>

<option value="tiktok">TikTok</option>

<option value="linkedin">LinkedIn</option>

<option value="twitter">X (Twitter)</option>

</select>

<label>Topic</label>

<input
type="text"
id="topic"
placeholder="Example: Artificial Intelligence">

<label>Tone</label>

<select id="tone">

<option value="professional">Professional</option>

<option value="friendly">Friendly</option>

<option value="motivational">Motivational</option>

<option value="funny">Funny</option>

<option value="marketing">Marketing</option>

</select>

<button class="btn" id="generateCaption">
Generate Caption
</button>

<button class="btn" id="clearCaption">
Clear
</button>

</div>

<!-- Output -->

<div class="caption-preview">

<h2>Generated Caption</h2>

<div id="captionOutput">

<p>Your caption will appear here...</p>

</div>

<button class="btn" id="copyCaption">
Copy Caption
</button>

</div>

</div>

</div>

</section>

<script src="caption-generator.js"></script>

</body>

</html>
